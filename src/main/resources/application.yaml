server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-mute-poetry-amyvhz5r-pooler.c-5.us-east-1.aws.neon.tech/neondb}
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD:npg_8JgqyVvpm6wl}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  jackson:
    serialization:
      indent-output: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${COMPANY_EMAIL:your-email@gmail.com}
    password: ${COMPANY_EMAIL_PASSWORD:your-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:your-very-long-and-secure-secret-key-at-least-256-bits}
    expiration: ${JWT_EXPIRATION:86400000}

  frontend:
    url: ${FRONTEND_URL:http://localhost:8081}

logging:
  level:
    org.springframework.security: DEBUG