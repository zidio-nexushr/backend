server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-sweet-pond-atimv41l-pooler.c-9.us-east-1.aws.neon.tech/neondb}
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD:npg_nDcyrdJaX23P}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      max-lifetime: 600000
      connection-timeout: 30000
      idle-timeout: 300000
      keepalive-time: 60000

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  jackson:
    serialization:
      indent-output: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${COMPANY_EMAIL:your-email@gmail.com}
    password: ${COMPANY_EMAIL_PASSWORD:your-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always

app:
  jwt:
    secret: ${JWT_SECRET:your-very-long-and-secure-secret-key-at-least-256-bits}
    expiration: ${JWT_EXPIRATION:86400000}

  frontend:
    url: ${FRONTEND_URL:http://localhost:8081}

logging:
  level:
    org.springframework.security: DEBUG

